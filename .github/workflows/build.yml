name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:

    - name: 下载代码
      uses: actions/checkout@v5

    - name: 安装 Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: 安装依赖
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: 打包 EXE
      run: pyinstaller -w -i icon.ico --add-data "icon.ico;." --name "PDF Tools" split.py

    - name: 上传结果
      uses: actions/upload-artifact@v4
      with:
        name: PDF-Tools
        path: dist/
